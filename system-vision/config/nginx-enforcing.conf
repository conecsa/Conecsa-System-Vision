# Enforcing TLS block (active once the device is paired). Terminates TLS with the
# hub-signed device certificate and REQUIRES a client certificate signed by the
# hub CA (mTLS) — so only the hub can reach the device, regardless of network/IP.
# Proxies the WASM UI, the api-gateway and Node-RED behind that single gate.
server {
    listen 443 ssl;
    server_name _;

    # Re-resolve upstream service names at request time (via Docker's embedded
    # DNS) so a redeployed api-gateway/flow with a new IP doesn't 502.
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate        /etc/conecsa/certs/device.crt;
    ssl_certificate_key    /etc/conecsa/certs/device.key;
    ssl_client_certificate /etc/conecsa/certs/ca.crt;
    ssl_verify_client      on;

    # Allow large multipart uploads (model .pt/.onnx/.engine files, dataset ZIPs)
    # to reach the api-gateway. Without this nginx caps bodies at its 1m default
    # and rejects the upload with 413 before Flask sees it. Kept in sync with the
    # gateway's MAX_CONTENT_LENGTH (api-gateway/gateway/app.py).
    client_max_body_size 600m;

    # WASM frontend.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # api-gateway (REST + MJPEG + SSE). Disable buffering so the streaming
    # endpoints (video_feed*, events/stream) flush immediately. Variable upstream
    # forces per-request resolution.
    location /api/ {
        set $api_upstream api-gateway;
        proxy_pass http://$api_upstream:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Stamp the verified client-cert result (always SUCCESS here, since
        # ssl_verify_client is on): the gateway uses it to tell hub pulls from
        # local snapshot consumers for the offline-buffer heartbeat.
        proxy_set_header X-Conecsa-Client-Verify $ssl_client_verify;
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # Enrollment renewal + unpair over the established mTLS channel. The verified
    # client result is forwarded so the gateway can authorize sensitive ops
    # (e.g. /enroll/reset) to the owning hub only.
    location /enroll/ {
        set $api_upstream api-gateway;
        proxy_pass http://$api_upstream:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Conecsa-Client-Verify $ssl_client_verify;
    }

    # Node-RED (Flow), including its /flow/comms editor websocket. Node-RED is
    # configured with httpAdminRoot/httpRoot = /flow (flow/settings.js).
    location /flow/ {
        set $flow_upstream flow;
        proxy_pass http://$flow_upstream:1880;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1h;
    }
}

# Enrollment TLS block (active until the device is paired). Serves only the
# /enroll/* endpoints over a temporary self-signed certificate; the hub connects
# with verification disabled and confirms the device key fingerprint (TOFU)
# during the one-time pairing handshake.
server {
    listen 443 ssl;
    server_name _;

    # Re-resolve the api-gateway service name at request time (Docker DNS).
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/conecsa/certs/snakeoil.crt;
    ssl_certificate_key /etc/conecsa/certs/snakeoil.key;

    location /enroll/ {
        set $api_upstream api-gateway;
        proxy_pass http://$api_upstream:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location / {
        return 404;
    }
}

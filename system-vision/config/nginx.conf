# Internal plaintext :80 server — not published in production (only the :443 mTLS
# terminator is exposed); kept for the container healthcheck and Docker-network
# upstreams. Serves the WASM UI and proxies /api and /flow to their services.
# Upstreams use a variable + Docker's resolver so a redeployed service (new IP)
# doesn't 502.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Allow large multipart uploads (model .pt/.onnx/.engine files, dataset ZIPs)
    # to reach the api-gateway. Without this nginx caps bodies at its 1m default
    # and rejects the upload with 413. Kept in sync with the gateway's
    # MAX_CONTENT_LENGTH (api-gateway/gateway/app.py).
    client_max_body_size 600m;

    # Enable gzip for WASM files
    gzip on;
    gzip_types application/wasm application/javascript text/css;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # api-gateway (REST + MJPEG + SSE). Buffering off so streams flush immediately.
    location /api/ {
        set $api_upstream api-gateway;
        proxy_pass http://$api_upstream:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Plaintext clients are never the hub: clear the verified-client header
        # so it cannot be spoofed past the mTLS terminator.
        proxy_set_header X-Conecsa-Client-Verify "";
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # Node-RED (Flow), served under /flow (httpAdminRoot=/flow).
    location /flow/ {
        set $flow_upstream flow;
        proxy_pass http://$flow_upstream:1880;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1h;
    }
}

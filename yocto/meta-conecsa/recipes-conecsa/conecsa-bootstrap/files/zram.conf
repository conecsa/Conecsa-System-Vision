# /etc/default/zram — overrides for zram-swap-init (meta-openembedded/zram_0.2.bb)
#
# Purpose: in-RAM compression relief-valve that absorbs fragmentation peaks
# from the inference-service glibc heap (.pt -> .onnx -> .engine conversion
# and accumulated TensorRT interpreter leaks). Without zram, the Yocto host
# has no swap at all and RSS grows until OOM (on the official JetPack image,
# nvzramconfig provides the equivalent).
#
# IMPORTANT: the L4T kernel (5.15.185-l4t) was built with
# CONFIG_ZRAM_DEF_COMP="lzo-rle" and WITHOUT CONFIG_CRYPTO_ZSTD builtin.
# Setting zstd here makes zramctl fail with "failed to set algorithm: Invalid
# argument" and the swap never comes up. lz4 is available in the kernel and
# offers competitive performance (~2.5:1 ratio, ~3x faster than zstd).
#
# Values are consumed by zram-swap-init (meta-openembedded/.../zram-swap-init).

ZRAM_SIZE_PERCENT=50
ZRAM_ALGORITHM=lz4

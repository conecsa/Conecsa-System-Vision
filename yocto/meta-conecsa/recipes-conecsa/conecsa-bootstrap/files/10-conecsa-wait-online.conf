# Drop-in for systemd-networkd-wait-online.service.
#
# Default behaviour waits for EVERY managed link to come online and only gives
# up after a 120s timeout. On this device that 120s is paid on every boot when
# a NIC is managed but down (e.g. Wi-Fi with no credentials yet, or an unplugged
# Ethernet port), because docker.service is ordered After=network-online.target
# and the whole compose stack therefore can't start until the wait expires.
#
# --any: succeed as soon as ONE managed link is online (wired DHCP usually wins
#        in a few seconds), instead of blocking on the slowest/never-up link.
# --timeout=10: a network truly absent at boot costs at most 10s, not 120s; the
#        services reconnect on their own once a link appears afterwards.
#
# The empty ExecStart= is REQUIRED: without it the drop-in APPENDS a second
# command to the oneshot unit instead of replacing the stock one, so the
# stock all-links/120s wait still ran first — measured 120s on every boot
# with the Ethernet cable unplugged, delaying docker and the whole stack.
[Service]
ExecStart=
ExecStart=/usr/lib/systemd/systemd-networkd-wait-online --any --timeout=10

# /etc/sysctl.d/99-conecsa-memory.conf
#
# Memory tuning for hosting the inference-service (TensorRT + PyTorch in
# containers). Paired with /etc/default/zram (zram_0.2.bb) and with
# transparent_hugepage=madvise on the kernel cmdline.
#
# - swappiness=100: favors swap (which here is compressed zram) over
#   page-cache eviction. Without this, the kernel avoids zram and keeps
#   the fragmented heap resident.
# - vfs_cache_pressure=200: reclaims dentry/inode cache more aggressively
#   under pressure, since the workload is not file-IO-bound.
# - overcommit_memory=1: accepts the TensorRT builder's large transient
#   allocations (workspace up to 256 MB + ONNX parser) instead of
#   refusing with ENOMEM when committed_AS exceeds the heuristic limit.

vm.swappiness = 100
vm.vfs_cache_pressure = 200
vm.overcommit_memory = 1

# Conecsa SSH hardening drop-in.
#
# /etc/ssh/sshd_config includes /etc/ssh/sshd_config.d/*.conf near its top
# (before the debug-tweaks lines that set "PermitRootLogin yes" /
# "PermitEmptyPasswords yes"). sshd uses the FIRST value seen for each
# keyword, so the settings here override debug-tweaks without editing the
# generated sshd_config.
#
# Effect: SSH login is key-only (no passwords, no empty passwords, no
# keyboard-interactive), and root may log in over SSH only with a public
# key. The serial console is unaffected and stays as the provisioning /
# recovery channel.

PasswordAuthentication no
PermitEmptyPasswords no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PubkeyAuthentication yes
PermitRootLogin prohibit-password

# --- "Only permitted hosts" ---------------------------------------------
# Preferred: restrict per key, set when you paste the key over serial, e.g.
#   from="172.29.0.0/16,10.0.0.5" ssh-ed25519 AAAA... admin@station
# That keeps this image generic (no network baked in).
#
# Alternatively, to enforce the allowed network at the daemon level for the
# whole device, uncomment and edit the line below, then rebuild + reflash.
# AllowUsers supports space-separated user@CIDR entries (OpenSSH 9.6).
#AllowUsers root@172.29.0.0/16

# DISTRO conecsa — replicates the essential defines from tegrademo (part of
# tegra-demo-distro/meta-tegrademo) WITHOUT `INHERIT tegra-support-sanity`,
# which rewrites bblayers.conf using a template incompatible with the kas
# layout (it expected every layer to live as a peer inside the poky dir).

require conf/distro/include/conecsa.inc

# Tegrademo inherits the hash equivalence server — kept here to speed up builds.
BB_SIGNATURE_HANDLER ?= "OEEquivHash"
BB_HASHSERVE ??= "auto"

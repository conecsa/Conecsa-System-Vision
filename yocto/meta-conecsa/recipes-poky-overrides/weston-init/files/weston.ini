# Conecsa kiosk configuration (overrides poky's weston.ini via the
# weston-init bbappend in meta-conecsa).
#
# kiosk-shell fullscreens every xdg-toplevel it gets, so the hub-vision
# window (1440x900/maximized in tauri.conf.json) fills the DisplayPort
# output with no decorations. [autolaunch] starts the wrapper as the
# `weston` user; watch=true ends the compositor when the app exits, and the
# systemd drop-in's Restart=always then recycles the whole kiosk session.

[core]
shell=kiosk-shell.so
idle-time=0
require-input=false

[autolaunch]
path=/usr/bin/hub-kiosk
watch=true

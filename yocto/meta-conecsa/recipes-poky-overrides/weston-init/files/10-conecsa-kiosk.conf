# Conecsa: this distro has no PAM (DISTRO_FEATURES), so the stock unit's
# PAMName=weston-autologin is ignored — no logind session ever creates
# XDG_RUNTIME_DIR or grants seat access. Provide the runtime dir ourselves and
# mediate VT/DRM/input access through the root seatd daemon (the weston user
# cannot open /dev/tty0 or /dev/dri/card0 itself; libseat's builtin backend
# fails for the same reason, validated on the device).
[Unit]
Requires=seatd.service
After=seatd.service

[Service]
Environment=XDG_RUNTIME_DIR=/run/weston
Environment=LIBSEAT_BACKEND=seatd
RuntimeDirectory=weston
RuntimeDirectoryMode=0700

# weston.ini [autolaunch] watch=true ends weston when the hub exits; recycle
# the whole kiosk session (the hub-kiosk wrapper sleeps 30 s when the binary
# has not been deployed yet, so this never becomes a tight loop).
Restart=always
RestartSec=2
